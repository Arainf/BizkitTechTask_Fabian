<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipment Rental</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    label { display: block; margin: 12px 0 4px; font-weight: 600; font-size: 0.9rem; }
    select, input { width: 100%; padding: 8px; font-size: 1rem; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 16px; font-size: 1rem; cursor: pointer; }
    .total { margin-top: 16px; font-size: 1.2rem; font-weight: 700; }
    .message { margin-top: 16px; padding: 10px; border-radius: 6px; }
    .ok { background: #e6f4ea; color: #1e7e34; }
    .err { background: #fdecea; color: #c0392b; }
    .required { color: red;}
  </style>
</head>
<body>
  <h1>Book Equipment</h1>

  <label for="equipment">Equipment<span class="required">*</span></label>
  <select id="equipment" required></select>

  <label for="customer">Customer name<span class="required">*</span></label>
  <input id="customer" type="text" placeholder="e.g. Jane Doe" required/>

  <label for="from">Start date<span class="required">*</span></label>
  <input id="from" type="date" required/>

  <label for="to">End date<span class="required">*</span></label>
  <input id="to" type="date" required />

  <div class="total" id="total">Total: PHP 0.00</div>

  <button id="book">Create booking</button>

  <div id="message"></div>

  <script>
    let equipmentList = [];

   async function loadEquipment() {
      const res = await fetch("/api/equipment");
      equipmentList = await res.json();
      const select = document.getElementById("equipment");
      select.innerHTML = "";
      equipmentList.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.id;
        if (item.status === "maintenance"){
          opt.textContent = `${item.name} (PHP ${item.daily_rate}/day) : under ${item.status} `;
          opt.disabled = true;
        } else {
          opt.textContent = `${item.name} (PHP ${item.daily_rate}/day)`;
        }
      
        select.appendChild(opt);
      });
    }

    function selectedEquipment() {
      const id = Number(document.getElementById("equipment").value);
      return equipmentList.find(e => e.id === id);
    }

    function dayCount(from, to) {
      // Rentals are billed inclusively: both start and end day count.
      const ms = new Date(to) - new Date(from);
      return Math.round(ms / (1000 * 60 * 60 * 24)) + 1;
    }

    function updateTotal() {
      const equipment = selectedEquipment();
      const from = document.getElementById("from").value;
      const to = document.getElementById("to").value;
      const totalEl = document.getElementById("total");

      if (!equipment || !from || !to) {
        totalEl.textContent = "Total: PHP 0.00";
        return;
      }
      const days = dayCount(from, to);
      if (days < 1) {
        totalEl.textContent = "Total: PHP 0.00";
        return;
      }
      let discount = 0;
      let total = 0;
      let price = equipment.daily_rate * days;
      
      if (days >= 7 ){
        discount = price * .10;
        total = price - discount;
      } else {
        total = price;
      }
    
      totalEl.textContent = days >= 7
      ? `Total: PHP ${total.toFixed(2)} (${days} days, 10% off — PHP ${discount.toFixed(2)} saved)`
      : `Total: PHP ${total.toFixed(2)} (${days} day${days > 1 ? "s" : ""})`;
    }

    async function createBooking() {
      const messageEl = document.getElementById("message");
      messageEl.className = "";
      messageEl.textContent = "";

      const equipmentEl = document.getElementById("equipment");
      const customerEl = document.getElementById("customer");
      const fromEl = document.getElementById("from");
      const toEl = document.getElementById("to");

      // Required field validation
      const missing = [];
      if (!equipmentEl.value) missing.push("Equipment");
      if (!customerEl.value.trim()) missing.push("Customer name");
      if (!fromEl.value) missing.push("Start date");
      if (!toEl.value) missing.push("End date");
      if (missing.length > 0) {
          messageEl.className = "message err";
          messageEl.textContent = `Please fill in: ${missing.join(", ")}`;
          return;
      }

      // Date order validation
      if (toEl.value < fromEl.value) {
          messageEl.className = "message err";
          messageEl.textContent = "End date cannot be before start date.";
          return;
      }

      const body = {
        equipment_id: Number(equipmentEl.value),
        customer: customerEl.value.trim(),
        from_date: fromEl.value,
        to_date: toEl.value,
      };

      const res = await fetch("/api/bookings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();

      if (res.ok) {
        messageEl.className = "message ok";
        messageEl.textContent = `Booked! Total PHP ${data.total.toFixed(2)}.`;
      } else {
        messageEl.className = "message err";
        messageEl.textContent = data.error;
      }
    }

    document.getElementById("equipment").addEventListener("change", updateTotal);
    document.getElementById("from").addEventListener("change", updateTotal);
    document.getElementById("book").addEventListener("click", createBooking);

    loadEquipment();
  </script>
</body>
</html>
